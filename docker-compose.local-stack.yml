services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: remove_watermark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${STACK_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${STACK_REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "${STACK_MINIO_PORT:-9000}:9000"
      - "${STACK_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio miniopassword; do
        echo 'minio-init waiting for minio...';
        sleep 1;
      done &&
      mc mb --ignore-existing local/${MINIO_BUCKET_ASSETS:-remove-waterremark} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_RESULTS:-remove-waterremark} &&
      printf '%s' '<CORSConfiguration><CORSRule><AllowedOrigin>*</AllowedOrigin><AllowedMethod>GET</AllowedMethod><AllowedMethod>PUT</AllowedMethod><AllowedMethod>POST</AllowedMethod><AllowedMethod>HEAD</AllowedMethod><AllowedHeader>*</AllowedHeader></CORSRule></CORSConfiguration>' > /tmp/cors.xml &&
      (mc cors set local/${MINIO_BUCKET_ASSETS:-remove-waterremark} /tmp/cors.xml || true) &&
      (mc cors set local/${MINIO_BUCKET_RESULTS:-remove-waterremark} /tmp/cors.xml || true)
      "

  inference-gateway:
    build:
      context: ./apps/inference-gateway
      dockerfile: Dockerfile
    environment:
      INFERENCE_SHARED_TOKEN: inference-local-token
      INFERENCE_MODEL_MODE: ${INFERENCE_MODEL_MODE:-mock}
      INFERENCE_PYTHON_BIN: python3
      LAMA_REPO_DIR: /opt/repos/lama
      PROPAINTER_REPO_DIR: /opt/repos/propainter
      MODEL_LAMA_PATH: /models/lama
      MODEL_PROPAINTER_PATH: /models/propainter
      INFERENCE_ASSET_DIR: /data/assets
      INFERENCE_RESULT_DIR: /data/results
      INFERENCE_WORK_DIR: /data/work
      INFERENCE_TIMEOUT_IMAGE_SEC: "240"
      INFERENCE_TIMEOUT_VIDEO_SEC: "1200"
      INFERENCE_TIMEOUT_DOC_SEC: "300"
      PROPAINTER_FP16: "true"
      PROPAINTER_SUBVIDEO_LENGTH: "80"
      PROPAINTER_NEIGHBOR_LENGTH: "10"
      PROPAINTER_REF_STRIDE: "10"
      PROPAINTER_RESIZE_RATIO: "1.0"
      LAMA_REFINE: "false"
      DEFAULT_PDF_RENDERER: pdfium
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://127.0.0.1:${STACK_MINIO_PORT:-9000}}
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: miniopassword
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-remove-waterremark}
      MINIO_BUCKET_RESULTS: ${MINIO_BUCKET_RESULTS:-remove-waterremark}
      MINIO_SOURCE_PREFIX: ${MINIO_SOURCE_PREFIX:-source}
      MINIO_RESULT_PREFIX: ${MINIO_RESULT_PREFIX:-result}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_SECURE: "false"
    volumes:
      - ./.runtime/inference-assets:/data/assets
      - ./.runtime/inference-results:/data/results
      - ./.runtime/inference-work:/data/work
      - ${LAMA_REPO_HOST_PATH:-./.runtime/model-repos/lama}:/opt/repos/lama
      - ${PROPAINTER_REPO_HOST_PATH:-./.runtime/model-repos/propainter}:/opt/repos/propainter
      - ${LAMA_MODEL_HOST_PATH:-./.runtime/model-weights/lama}:/models/lama
      - ${PROPAINTER_MODEL_HOST_PATH:-./.runtime/model-weights/propainter}:/models/propainter
    ports:
      - "${STACK_INFERENCE_PORT:-8088}:8088"
    depends_on:
      - minio
      - minio-init

  api-gateway:
    image: node:20
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @apps/api-gateway prisma:generate &&
      until pnpm --filter @apps/api-gateway prisma:push; do
        echo 'api-gateway waiting for postgres...';
        sleep 2;
      done &&
      pnpm --filter @apps/api-gateway exec tsx src/main.ts"
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/remove_watermark
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://127.0.0.1:${STACK_MINIO_PORT:-9000}}
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: miniopassword
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-remove-waterremark}
      MINIO_BUCKET_RESULTS: ${MINIO_BUCKET_RESULTS:-remove-waterremark}
      MINIO_SOURCE_PREFIX: ${MINIO_SOURCE_PREFIX:-source}
      MINIO_RESULT_PREFIX: ${MINIO_RESULT_PREFIX:-result}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PRESIGN_ENABLED: "true"
      MINIO_PRESIGN_EXPIRE_SEC: "600"
      INFERENCE_GATEWAY_URL: http://inference-gateway:8088
      INFERENCE_SHARED_TOKEN: inference-local-token
      FEATURE_IMAGE: "true"
      FEATURE_VIDEO: "true"
      FEATURE_PDF: "true"
      FEATURE_PPT: "true"
      TASKS_STORE: prisma
      SUBSCRIPTIONS_STORE: prisma
      WEBHOOKS_STORE: prisma
      COMPLIANCE_STORE: prisma
      CI: "true"
    depends_on:
      - postgres
      - redis
      - minio
      - minio-init
      - inference-gateway
    ports:
      - "${STACK_API_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const req=require('http').request({hostname:'127.0.0.1',port:3000,path:'/v1/auth/wechat-login',method:'POST',headers:{'content-type':'application/json'}},(res)=>process.exit(res.statusCode && res.statusCode >= 200 && res.statusCode < 300 ? 0 : 1));req.on('error',()=>process.exit(1));req.end(JSON.stringify({code:'admin',username:'admin',password:'admin123'}));"
      interval: 5s
      timeout: 3s
      retries: 30

  worker-orchestrator:
    image: node:20
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      until pnpm --filter @apps/worker-orchestrator exec tsx --version >/dev/null 2>&1; do
        echo 'worker-orchestrator waiting for workspace dependencies...';
        sleep 2;
      done &&
      until node -e \"const req=require('http').request({hostname:'api-gateway',port:3000,path:'/v1/auth/wechat-login',method:'POST',headers:{'content-type':'application/json'}},(res)=>process.exit(res.statusCode && res.statusCode >= 200 && res.statusCode < 300 ? 0 : 1));req.on('error',()=>process.exit(1));req.end(JSON.stringify({code:'admin',username:'admin',password:'admin123'}));\"; do
        echo 'worker-orchestrator waiting for api-gateway health...';
        sleep 2;
      done &&
      pnpm --filter @apps/worker-orchestrator exec tsx src/main.ts"
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/remove_watermark
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: task.standard
      QUEUE_DEADLETTER_NAME: task.standard.deadletter
      INFERENCE_GATEWAY_URL: http://inference-gateway:8088
      INFERENCE_SHARED_TOKEN: inference-local-token
      RESULT_EXPIRE_DAYS: "30"
      ASSET_SOURCE_MODE: ${ASSET_SOURCE_MODE:-minio}
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-remove-waterremark}
      MINIO_BUCKET_RESULTS: ${MINIO_BUCKET_RESULTS:-remove-waterremark}
      MINIO_SOURCE_PREFIX: ${MINIO_SOURCE_PREFIX:-source}
      MINIO_RESULT_PREFIX: ${MINIO_RESULT_PREFIX:-result}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://127.0.0.1:${STACK_MINIO_PORT:-9000}}
      ORCHESTRATOR_WORKER_CONCURRENCY: "1"
      CI: "true"
    depends_on:
      api-gateway:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
      inference-gateway:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

volumes:
  pg_data:
  minio_data:
